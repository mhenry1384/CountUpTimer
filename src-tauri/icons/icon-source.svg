<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="CountUp Timer icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18e0a0"/>
      <stop offset="100%" stop-color="#00b7ff"/>
    </linearGradient>
    <linearGradient id="grow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b3d"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <!-- Clock ring -->
  <circle cx="512" cy="540" r="290" fill="none" stroke="#1f2f4d" stroke-width="54"/>
  <path d="M 512 250 A 290 290 0 1 1 312 790" fill="none" stroke="url(#ring)" stroke-width="54" stroke-linecap="round"/>

  <!-- Tick marks -->
  <g stroke="#9fb2d6" stroke-width="20" stroke-linecap="round" opacity="0.75">
    <line x1="512" y1="214" x2="512" y2="248"/>
    <line x1="786" y1="540" x2="752" y2="540"/>
    <line x1="512" y1="866" x2="512" y2="832"/>
    <line x1="238" y1="540" x2="272" y2="540"/>
  </g>

  <!-- Increasing arrow as hand -->
  <path d="M 430 640 L 610 460" fill="none" stroke="url(#grow)" stroke-width="64" stroke-linecap="round"/>
  <path d="M 588 404 L 702 390 L 688 504" fill="none" stroke="url(#grow)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="512" cy="540" r="44" fill="#ecf3ff"/>
</svg>
